---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=50]
      - id: check-ast
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
        args: [--assume-in-merge]
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-submodules
      - id: mixed-line-ending
      - id: no-commit-to-branch
      - id: pretty-format-json
        args: [--autofix]
      - id: trailing-whitespace

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - --strict
          - >
            -d={extends: default, rules: {
            quoted-strings: {quote-type: single,
                             required: only-when-needed}}}

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: remove-tabs

  - repo: https://github.com/WGUNDERWOOD/tex-fmt
    rev: v0.5.7
    hooks:
      - id: tex-fmt
        args: [-f, -n, -r, -v, --format-tables]

  - repo: https://github.com/FlamingTempura/bibtex-tidy
    rev: v1.14.0
    hooks:
      - id: bibtex-tidy
        args:
          - --align=10
          - --blank-lines
          - --curly
          - --duplicates
          - --drop-all-caps
          - --encode-urls
          - --no-escape
          - --no-wrap
          - --numeric
          - --omit=abstract,copyright,keywords,language,note,notes,shorttitle
          - --remove-dupe-fields
          - --remove-empty-fields
          - --sort
          - --sort-fields
          - --strip-comments
          - --trailing-commas

  - repo: https://github.com/meliache/pre-commit-chktex
    rev: v0.2.2
    hooks:
      - id: chktex-system
        args: [-eall, -n3, -n12, -n22, -n30, -n46]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/numpy/numpydoc
    rev: v1.11.0rc0
    hooks:
      - id: numpydoc-validation

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--no-cache, --fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - matplotlib
          - numpy
          - osmnx
          - pandas-stubs
          - pytest
          - scipy-stubs
          - seaborn
          - shapely
          - statsmodels
          - types-requests
